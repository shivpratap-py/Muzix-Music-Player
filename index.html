      </div>
      <div class="hamburger flex">
        <img src="/assets/images/hamburger.svg" alt="">
      </div>
        </div>
      </div>
      <div class="playlist">
        <h1>Playlist</h1>
        <div class="cardContainer">
          <div class="card">
            <img src="https://image-cdn-ak.spotifycdn.com/image/ab67706c0000d72c1b591c565907f24838477047" alt="" />

            <div class="play">

              </svg>

          </div>
          
          </div>

            <div class="progress"></div>
            <div class="circle">

            </div>
          </div>
          <div class="info ">
            <div class="songinfo">

            </div>
            <div class="songtime"></div>
          </div>
          <div class="songbuttons flex" style="align-items: center;">
            <div class="mainbtn">
            <img class="bbtn" width="35" id="previous" src="assets/images/prevsong.svg" alt="" />
            <img class="bbtn" width="35" id="play" src="assets/images/play.svg" alt="" />
            <img class="bbtn" width="35" id="next" src="assets/images/next.svg" alt="" />
            </div>
            <div class="volume">
              <img src="/assets/images/volume.svg" alt="">
              <div class="range">
                <input type="range" name="volume" id="">
              </div>
            </div>
          </div>
